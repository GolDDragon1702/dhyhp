<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chứng nhận sức khỏe thuyền viên — BV ĐH Y Hải Phòng</title>
<style>
  :root{ --blue:#0a7bc4; --blue-dark:#075a90; --green:#1f9d57; --red:#e23b3b;
         --ink:#16313f; --muted:#5b7689; --line:#e1ebf2; }
  *{box-sizing:border-box}
  body{margin:0;background:#eef4f8;color:var(--ink);
       font-family:"Segoe UI",Roboto,Arial,sans-serif;line-height:1.5;
       min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px}
  .card{background:#fff;max-width:430px;width:100%;border-radius:16px;overflow:hidden;
        box-shadow:0 8px 30px rgba(10,60,98,.16);border:1px solid var(--line)}
  .top{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;
       padding:18px 18px 16px;text-align:center}
  .top img{width:74px;height:74px;background:#fff;border-radius:50%;padding:4px;
           box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .top h1{margin:8px 0 2px;font-size:15px;font-weight:700}
  .top .en{font-size:11.5px;opacity:.9;margin:0}
  .title{text-align:center;padding:14px 16px 6px}
  .title b{display:block;font-size:15px;color:var(--blue-dark);font-weight:700;letter-spacing:.2px}
  .title span{font-size:11px;color:var(--muted)}
  .badge{margin:12px 16px;padding:12px;border-radius:12px;text-align:center;
         background:#e8f8ef;border:1.5px solid var(--green)}
  .badge b{display:block;color:var(--green);font-size:16px;font-weight:800;text-transform:uppercase}
  .badge span{font-size:11px;color:#4a6a59}
  .info{padding:4px 18px 6px}
  .row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .row:last-child{border-bottom:none}
  .row .k{color:var(--muted);flex:0 0 auto}
  .row .v{font-weight:600;text-align:right;word-break:break-word}
  .foot{padding:12px 18px 18px;text-align:center;font-size:11px;color:var(--muted)}
  .foot .src{margin-top:6px;color:#9bb0bf}
  .err{padding:40px 24px;text-align:center;color:var(--muted)}
  .err b{color:var(--red)}
</style>
</head>

function unb64u(s){
  s=s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4) s+='=';
  var bin=atob(s), b=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(b);
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
  });
}
function row(k,v){
  return '<div class="row"><span class="k">'+k+'</span><span class="v">'+esc(v||'—')+'</span></div>';
}
function showError(msg){
  document.getElementById('app').innerHTML =
    '<div class="card"><div class="top"><img src="'+LOGO+'" alt=""><h1>Bệnh viện Đại học Y Hải Phòng</h1></div>'+
    '<div class="err"><b>Không đọc được dữ liệu</b><br>'+esc(msg)+'</div></div>';
}
function render(){
  var h = location.hash.replace(/^#/,'');
  if(!h){ showError('Mã QR không chứa dữ liệu.'); return; }
  var name,dob,gender;
  try{
    var p = unb64u(h).split('|');   // [ver, tên, ngày sinh, giới tính]
    name=p[1]; dob=p[2]; gender=p[3];
    if(!name) throw 0;
  }catch(e){ showError('Định dạng dữ liệu không hợp lệ.'); return; }

  document.getElementById('app').innerHTML =
    '<div class="card">'+
      '<div class="top">'+
        '<img src="'+LOGO+'" alt="logo">'+
        '<h1>Bệnh viện Đại học Y Hải Phòng</h1>'+
        '<p class="en">Haiphong Medical University Hospital</p>'+
      '</div>'+
      '<div class="title">'+
        '<b>CHỨNG NHẬN SỨC KHỎE THUYỂN VIÊN</b>'+
        '<span>Certificate of health for seafarer</span>'+
      '</div>'+
      '<div class="badge">'+
        '<b>Phù hợp để làm việc trên biển</b>'+
        '<span>Fit for look-out duty</span>'+
      '</div>'+
      '<div class="info">'+
        row('Họ và tên', name)+
        row('Ngày sinh', dob)+
        row('Giới tính', gender)+
        row('Cơ sở y tế', 'Bệnh viện Đại học Y Hải Phòng')+
      '</div>'+
      '<div class="foot">Chứng nhận điện tử • Quét từ mã QR'+
        '<div class="src">Thông tin được mã hóa trực tiếp trong mã QR</div>'+
      '</div>'+
    '</div>';
}
render();
window.addEventListener('hashchange', render);
</script>
